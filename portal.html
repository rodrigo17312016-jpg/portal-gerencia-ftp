<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Gerencia — Frutos Tropicales Peru Export S.A.C.</title>
<link rel="icon" href="assets/images/logo.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<!-- CSS Modular -->
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/charts.css">

<!-- Anti-flash: aplicar tema antes de render -->
<script>
(function() {
  var t = localStorage.getItem('ftp_theme');
  if (t === 'dark') document.documentElement.classList.add('dark-mode');
  // Verificar sesion rapida para evitar flash
  try {
    var s = JSON.parse(localStorage.getItem('ftp_session') || 'null');
    if (!s || !s.user || s.expires <= Date.now()) {
      window.location.href = 'login.html';
    }
  } catch(e) { window.location.href = 'login.html'; }
})();
</script>
</head>
<body>

  <!-- ════════════ SIDEBAR ════════════ -->
  <aside class="sidebar" id="sidebar">
    <!-- Header con logo -->
    <div class="sidebar-header">
      <div class="sidebar-header-bg">
        <img class="sidebar-logo" src="assets/images/logo.png" alt="FTP">
        <div class="sidebar-title">
          <strong>Portal de Gerencia</strong>
        </div>
      </div>
    </div>

    <!-- Navegacion dinamica (construida por app.js segun rol) -->
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Se llena dinamicamente -->
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <a class="sidebar-web-btn" href="index.html" target="_blank">
        🌐 Visitar el Sitio Web
      </a>
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">G</div>
        <div>
          <div class="user-name" id="user-name">Usuario</div>
          <div class="user-role" id="user-role">Rol</div>
        </div>
        <button class="logout-btn" id="logout-btn" title="Cerrar sesion">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Overlay mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ════════════ TOPBAR ════════════ -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="menu-toggle">☰</button>
      <div>
        <div class="topbar-title">Portal de Gerencia</div>
        <div class="topbar-breadcrumb" id="topbar-breadcrumb">General / Resumen Ejecutivo</div>
      </div>
    </div>
    <div class="topbar-right">
      <!-- Conexion Supabase -->
      <div class="topbar-connection">
        <span class="status-dot" id="connection-status"></span>
        <span id="clock-time">--:--:--</span>
      </div>

      <!-- Fecha -->
      <div class="topbar-date">
        <div class="topbar-live"></div>
        <span id="clock-date">—</span>
      </div>

      <!-- Theme toggle -->
      <button class="topbar-theme" id="theme-toggle" title="Cambiar tema">🌙</button>

      <!-- Developer Signature -->
      <div class="topbar-dev-signature">
        <div class="topbar-sig-label">DESARROLLADO POR:</div>
        <div class="signature-name">Rodrigo Garcia</div>
        <div class="signature-role">Systems Analyst & Developer-QA</div>
      </div>
    </div>
  </header>

  <!-- ════════════ MAIN CONTENT ════════════ -->
  <main class="main" id="main-content">
    <!-- Los paneles se cargan dinamicamente aqui por router.js -->
    <div class="loading-spinner" id="initial-loader"></div>
  </main>

  <!-- Entry point -->
  <script type="module" src="assets/js/app.js"></script>

  <!-- Service Worker -->
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function(err) {
      console.warn('SW registration failed:', err);
    });
  }
  </script>

</body>
</html>
