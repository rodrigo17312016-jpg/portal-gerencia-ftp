<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Multi-Sede - PoC</title>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/reset.css">
<link rel="stylesheet" href="../assets/css/animations.css">
<link rel="stylesheet" href="../assets/css/layout.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
  body { padding: 24px; background: var(--bg); }
  .test-container { max-width: 1100px; margin: 0 auto; }
  .test-header { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .test-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 12px 0; border-top: 1px solid var(--border); }
  .test-row:first-of-type { border-top: 0; }
  .test-label { font-weight: 700; color: var(--texto); min-width: 200px; }
  .test-value { font-family: monospace; font-size: 12px; padding: 6px 10px; background: var(--surface3); border-radius: 6px; color: var(--texto); }
  .test-pass { color: #0e7c3a; font-weight: 800; }
  .test-fail { color: #be123c; font-weight: 800; }
  /* Topbar fake para mostrar selector */
  .fake-topbar {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 16px; margin-bottom: 16px;
    height: 60px;
  }
  .fake-topbar-left { font-weight: 800; font-size: 15px; color: var(--texto); }
  .fake-topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>

<div class="test-container">
  <h1 style="font-size: 24px; font-weight: 900; margin-bottom: 16px; color: var(--texto)">
    🧪 Test Multi-Sede / Multi-Planta — PoC
  </h1>

  <!-- Selector dentro de un fake topbar -->
  <div class="fake-topbar">
    <div class="fake-topbar-left">Topbar de prueba</div>
    <div class="topbar-right" id="fake-topbar-right">
      <!-- selector se monta aqui -->
    </div>
  </div>

  <!-- Resultados -->
  <div class="test-header">
    <h2 style="font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--texto)">Resultados</h2>
    <div id="results"></div>
  </div>

  <div class="test-header">
    <h2 style="font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--texto)">Cambia de planta arriba ↑ y mira los valores</h2>
    <p style="color: var(--muted); font-size: 13px">Estos números se escalan automáticamente por el factor de la sede seleccionada (FTP-Huaura=1.0, FTP-Piura=0.72, PRC-Maquila=0.41, Consolidado=2.13).</p>
    <div id="live-values" style="margin-top: 16px;"></div>
  </div>
</div>

<script type="module">
  import { initSedeContext, getSedeActiva, onSedeChange, isConsolidado } from '../assets/js/core/sede-context.js';
  import { mountSelectorSede } from '../assets/js/core/selector-sede.js';
  import { getScaleFactor, totalsBySede } from '../assets/js/utils/sede-mock-helper.js';
  import { getSedes, getAllSedesIncludingConsolidado } from '../assets/js/config/sedes.js';

  const results = document.getElementById('results');
  const live = document.getElementById('live-values');

  function row(label, ok, value) {
    const div = document.createElement('div');
    div.className = 'test-row';
    div.innerHTML = `
      <span class="test-label">${label}</span>
      <span class="${ok ? 'test-pass' : 'test-fail'}">${ok ? '✓ PASS' : '✗ FAIL'}</span>
      <span class="test-value">${value}</span>
    `;
    results.appendChild(div);
  }

  async function runTests() {
    // Test 1: load sedes
    try {
      const sedes = await getSedes();
      row('Carga de sedes (3 esperadas)', sedes.length === 3, `count=${sedes.length}`);
    } catch (e) { row('Carga de sedes', false, e.message); }

    // Test 2: consolidado disponible
    try {
      const all = await getAllSedesIncludingConsolidado();
      row('Lista incluye consolidado (4 items)', all.length === 4, `count=${all.length}`);
    } catch (e) { row('Lista con consolidado', false, e.message); }

    // Test 3: init context
    try {
      await initSedeContext();
      const sede = getSedeActiva();
      row('Init contexto → sede default', sede?.codigo === 'FTP-HUA', `activa=${sede?.codigo}`);
    } catch (e) { row('Init contexto', false, e.message); }

    // Test 4: factor escala
    try {
      const f = await getScaleFactor();
      row('Factor de escala FTP-HUA = 1', f === 1, `factor=${f}`);
    } catch (e) { row('Factor escala', false, e.message); }

    // Test 5: totals by sede
    try {
      const t = await totalsBySede([{x: 1000}], 'x');
      const ok = t.length === 3 && t[0].total === 1000 && t[1].total === 720 && t[2].total === 410;
      row('totalsBySede(1000) = [1000, 720, 410]', ok, JSON.stringify(t.map(r => r.total)));
    } catch (e) { row('totalsBySede', false, e.message); }

    // Test 6: montar selector
    try {
      const right = document.getElementById('fake-topbar-right');
      await mountSelectorSede(right);
      const btn = document.querySelector('.topbar-sede-btn');
      row('Selector montado en topbar', !!btn, btn ? 'visible' : 'no se montó');
    } catch (e) { row('Selector montar', false, e.message); }
  }

  async function renderLive() {
    const sede = getSedeActiva();
    const factor = await getScaleFactor();
    const isCons = isConsolidado();

    live.innerHTML = `
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;">
        <div class="kpi-card">
          <div class="kpi-label">Sede activa</div>
          <div class="kpi-value" style="color: ${sede?.color || '#0e7c3a'}; font-size: 22px">
            ${sede?.icono || '🏭'} ${sede?.nombreCorto || '—'}
          </div>
          <div class="kpi-change">${isCons ? 'Vista global' : sede?.tipo}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Factor escala</div>
          <div class="kpi-value">×${factor.toFixed(2)}</div>
          <div class="kpi-change">vs base FTP-HUA</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Producción simulada</div>
          <div class="kpi-value">${(1500 * factor).toFixed(0)} TN</div>
          <div class="kpi-change">base 1500 × factor</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Cajas exportadas</div>
          <div class="kpi-value">${Math.round(45000 * factor).toLocaleString('es-PE')}</div>
          <div class="kpi-change">base 45.000 × factor</div>
        </div>
      </div>
    `;
  }

  runTests().then(() => renderLive());
  onSedeChange(() => renderLive());
</script>
</body>
</html>
