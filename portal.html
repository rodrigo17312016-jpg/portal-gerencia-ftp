<!-- ═══════════ SECURITY HEADERS (via meta) ═══════════ -->
<!-- Content Security Policy - OWASP A05
     default-src self: nada carga por defecto excepto del mismo origen
     script-src self + CDNs autorizados (jsdelivr, Supabase)
     connect-src self + Supabase (REST + Realtime WebSocket)
     img-src self + data: (qr generado inline) + qrserver.com (2FA QR) -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com data:;
  img-src 'self' data: https://api.qrserver.com https://cdn.jsdelivr.net;
  connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net;
  frame-ancestors 'none';
  base-uri 'self';
  form-action 'self';
  object-src 'none';
  upgrade-insecure-requests;
">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="permissions-policy" content="camera=(), microphone=(), geolocation=(), payment=()">

<link rel="icon" href="assets/images/logo.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">

<!-- ═══════════ SRI (Subresource Integrity) para CDN scripts ═══════════ -->

<!-- Anti-flash: aplicar tema + verificar sesion sincrono (evita flash de portal sin sesion) -->
<script>
(function() {
  try {
    var t = localStorage.getItem('ftp_theme');
    if (t === 'dark') document.documentElement.classList.add('dark-mode');
    // Limpiar ftp_session legacy residual
    try { localStorage.removeItem('ftp_session'); } catch(e) {}

    // Busqueda rapida de token Supabase (JWT HS256 firmado)
    var hasSupabase = false;
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('sb-') === 0 && k.indexOf('-auth-token') > 0) {
        var val = localStorage.getItem(k);
        if (val && val.length > 100) {
          // Verificar expiracion para evitar portal con token expirado
          try {
            var parsed = JSON.parse(val);
            var exp = parsed.expires_at || (parsed.currentSession && parsed.currentSession.expires_at);
            if (!exp || exp * 1000 > Date.now()) { hasSupabase = true; break; }
          } catch(e) { hasSupabase = true; break; } // si no parsea, asumimos valido
        }
      }
    }
    if (!hasSupabase) {
      // replace() no agrega historia (evita back-button loop a portal sin sesion)
      window.location.replace('login.html');
    }
  } catch(e) { window.location.replace('login.html'); }
})();
</script>
