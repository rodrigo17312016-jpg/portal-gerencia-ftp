<!-- Panel: Area de Empaque -->
<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:8px">
  <div>
    <h2 style="font-size:22px;font-weight:900;color:var(--texto)">📦 Area de <span style="color:var(--verde)">Empaque</span></h2>
    <p style="font-size:13px;color:var(--muted);margin-top:4px">Control de empaque y despacho de producto congelado</p>
  </div>
</div>

<div class="kpi-grid">
  <div class="kpi-card"><div class="kpi-label">Cajas Producidas</div><div class="kpi-value" id="empCajas">—</div></div>
  <div class="kpi-card"><div class="kpi-label">Cajas/Hora</div><div class="kpi-value" id="empCajasHr">—</div></div>
  <div class="kpi-card"><div class="kpi-label">Kg Empacados</div><div class="kpi-value" id="empKg">—</div></div>
  <div class="kpi-card"><div class="kpi-label">Operarios</div><div class="kpi-value" id="empOperarios">—</div></div>
</div>

<div class="card" style="margin-top:20px">
  <div class="card-header"><div class="card-title">📋 Registro de Empaque</div></div>
  <div class="table-container">
    <table class="data-table">
      <thead><tr><th>Fecha</th><th>Hora</th><th>Fruta</th><th>Cajas</th><th>Peso Neto (kg)</th><th>Presentacion</th><th>Contenedor</th></tr></thead>
      <tbody id="empTabla"></tbody>
    </table>
  </div>
</div>
