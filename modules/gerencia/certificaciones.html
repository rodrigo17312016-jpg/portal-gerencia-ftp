<!-- Panel: Certificaciones -->
<style>
/* ═══ Certificaciones - Estilos propios ═══ */
.cert-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.cert-kpi{position:relative;overflow:hidden}
.cert-kpi::after{
  content:'';position:absolute;right:-20px;top:-20px;
  width:80px;height:80px;border-radius:50%;opacity:0.08;
}
.cert-kpi.ok::after{background:var(--verde)}
.cert-kpi.warn::after{background:var(--warn)}
.cert-kpi.danger::after{background:var(--danger)}
.cert-kpi.info::after{background:var(--primary,#3b82f6)}

/* Grid de certificaciones */
.cert-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
  margin-top:20px;
}
.cert-card{
  position:relative;
  background:var(--card-bg,#fff);
  border-radius:16px;
  padding:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
  transition:all 0.35s cubic-bezier(0.16,1,0.3,1);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  gap:14px;
  border-top:4px solid var(--verde);
}
.cert-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 30px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.06);
}
.cert-card.status-warn{border-top-color:var(--warn,#f59e0b)}
.cert-card.status-danger{border-top-color:var(--danger,#dc2626)}
.cert-card.status-danger{
  background:linear-gradient(135deg,rgba(220,38,38,0.04),rgba(220,38,38,0.01));
}
.cert-card.status-warn{
  background:linear-gradient(135deg,rgba(245,158,11,0.04),rgba(245,158,11,0.01));
}

/* Cabecera con logo */
.cert-head{
  display:flex;align-items:center;gap:14px;
  padding-bottom:12px;
  border-bottom:1px dashed rgba(0,0,0,0.08);
}
.cert-logo-wrap{
  flex-shrink:0;
  width:72px;height:72px;
  border-radius:12px;
  background:linear-gradient(135deg,#ffffff,#f8fafc);
  display:flex;align-items:center;justify-content:center;
  padding:8px;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.04);
}
.cert-logo-wrap img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.08))}

.cert-head-info{flex:1;min-width:0}
.cert-name{
  font-size:15px;font-weight:800;color:var(--texto,#0f172a);
  line-height:1.25;margin-bottom:6px;
}
.cert-result{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:800;color:#15803d;
  padding:3px 10px;border-radius:12px;
  background:rgba(22,163,74,0.1);
  letter-spacing:0.3px;
}

/* Footer con estado + countdown */
.cert-foot{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;padding-top:12px;
  border-top:1px dashed rgba(0,0,0,0.08);
}
.cert-expiry{display:flex;flex-direction:column;gap:2px}
.cert-expiry-label{
  font-size:9px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.8px;
}
.cert-expiry-date{font-size:13px;font-weight:800;color:var(--texto)}

.cert-countdown{
  text-align:right;display:flex;flex-direction:column;gap:2px;
}
.cert-countdown-num{
  font-size:20px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--verde),#15803d);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.cert-countdown.warn .cert-countdown-num{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.cert-countdown.danger .cert-countdown-num{
  background:linear-gradient(135deg,#dc2626,#991b1b);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.cert-countdown-label{
  font-size:9px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.8px;
}

/* Badge estado */
.cert-badge{
  position:absolute;top:12px;right:12px;
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  font-size:10px;font-weight:800;letter-spacing:0.5px;
  text-transform:uppercase;
}
.cert-badge.ok{background:rgba(22,163,74,0.12);color:#15803d}
.cert-badge.warn{background:rgba(245,158,11,0.15);color:#b45309;animation:certPulse 2s ease-in-out infinite}
.cert-badge.danger{background:rgba(220,38,38,0.15);color:#991b1b;animation:certPulse 1.2s ease-in-out infinite}
.cert-badge-dot{
  width:6px;height:6px;border-radius:50%;background:currentColor;
}
@keyframes certPulse{
  0%,100%{box-shadow:0 0 0 0 currentColor;opacity:1}
  50%{box-shadow:0 0 0 6px transparent;opacity:0.85}
}

/* Barra de progreso de vigencia */
.cert-progress{
  height:4px;border-radius:4px;
  background:rgba(0,0,0,0.06);overflow:hidden;
  margin-top:6px;
}
.cert-progress-fill{
  height:100%;border-radius:4px;
  transition:width 0.6s ease;
}
.cert-progress-fill.ok{background:linear-gradient(90deg,#16a34a,#22c55e)}
.cert-progress-fill.warn{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.cert-progress-fill.danger{background:linear-gradient(90deg,#dc2626,#ef4444)}

/* Dark mode tweaks */
.dark .cert-card{background:rgba(255,255,255,0.03)}
.dark .cert-logo-wrap{background:rgba(255,255,255,0.95)}
.dark .cert-head,.dark .cert-foot{border-color:rgba(255,255,255,0.08)}
.dark .cert-progress{background:rgba(255,255,255,0.06)}

/* Alerta destacada arriba si hay proximas/vencidas */
.cert-alert-banner{
  display:none;padding:14px 18px;border-radius:12px;
  background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(245,158,11,0.04));
  border-left:4px solid var(--warn,#f59e0b);
  margin-bottom:20px;
  align-items:center;gap:12px;
}
.cert-alert-banner.danger{
  background:linear-gradient(135deg,rgba(220,38,38,0.12),rgba(220,38,38,0.04));
  border-left-color:var(--danger,#dc2626);
}
.cert-alert-banner.visible{display:flex}
.cert-alert-icon{
  width:40px;height:40px;border-radius:50%;
  background:rgba(245,158,11,0.2);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:18px;
  animation:alertShake 2.5s ease-in-out infinite;
}
.cert-alert-banner.danger .cert-alert-icon{background:rgba(220,38,38,0.2)}
@keyframes alertShake{
  0%,50%,100%{transform:rotate(0)}
  10%{transform:rotate(-10deg)}
  20%{transform:rotate(10deg)}
  30%{transform:rotate(-6deg)}
  40%{transform:rotate(6deg)}
}
.cert-alert-title{font-weight:800;font-size:13px;color:var(--texto);margin-bottom:2px}
.cert-alert-text{font-size:12px;color:var(--muted)}
</style>

<!-- KPIs -->
<div class="cert-kpis">
  <div class="kpi-card cert-kpi info" style="border-top:3px solid var(--primary,#3b82f6)">
    <div class="kpi-label">Total Certificaciones</div>
    <div class="kpi-value" id="certTotal">10</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">registradas</div>
  </div>
  <div class="kpi-card cert-kpi ok" style="border-top:3px solid var(--verde)">
    <div class="kpi-label">Vigentes</div>
    <div class="kpi-value" style="color:var(--verde)" id="certVigentes">0</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">&gt; 3 meses restantes</div>
  </div>
  <div class="kpi-card cert-kpi warn" style="border-top:3px solid var(--warn)">
    <div class="kpi-label">Proximas a vencer</div>
    <div class="kpi-value" style="color:var(--warn)" id="certProximas">0</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">&lt; 3 meses</div>
  </div>
  <div class="kpi-card cert-kpi danger" style="border-top:3px solid var(--danger)">
    <div class="kpi-label">Vencidas</div>
    <div class="kpi-value" style="color:var(--danger)" id="certVencidas">0</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">requieren accion</div>
  </div>
</div>

<!-- Alerta general si hay proximas o vencidas -->
<div class="cert-alert-banner" id="certAlertBanner">
  <div class="cert-alert-icon" id="certAlertIcon">⚠️</div>
  <div>
    <div class="cert-alert-title" id="certAlertTitle"></div>
    <div class="cert-alert-text" id="certAlertText"></div>
  </div>
</div>

<!-- Grid de certificaciones -->
<div class="card">
  <div class="card-header">
    <div class="card-title">🏅 Certificaciones del Sistema de Gestion</div>
    <span class="badge badge-verde" id="certBadgeTotal">10 registradas</span>
  </div>
  <div class="cert-grid" id="certGrid"></div>
</div>
