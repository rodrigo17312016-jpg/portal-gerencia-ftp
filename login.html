<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Frutos Tropicales Peru Export S.A.C.</title>

<!-- Security headers (OWASP A05) -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com data:;
  img-src 'self' data:;
  connect-src 'self' https://*.supabase.co wss://*.supabase.co;
  frame-ancestors 'none';
  base-uri 'self';
  form-action 'self';
  object-src 'none';
  upgrade-insecure-requests;
">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="permissions-policy" content="camera=(), microphone=(), geolocation=(), payment=()">

<link rel="icon" href="assets/images/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/login-page.css">
</head>
<body>

<!-- Background -->
<div class="login-bg"></div>
<div class="login-overlay"></div>
<div class="light-rays"></div>

<!-- Particles - mix of bright, gold, green -->
<div class="particles">
  <div class="particle bright" style="width:3px;height:3px;top:12%;left:8%;animation-duration:7s"></div>
  <div class="particle gold" style="width:4px;height:4px;top:22%;left:75%;animation-delay:1s;animation-duration:8s"></div>
  <div class="particle green" style="width:3px;height:3px;top:55%;left:15%;animation-delay:2s;animation-duration:6s"></div>
  <div class="particle bright" style="width:5px;height:5px;top:65%;left:65%;animation-delay:.5s;animation-duration:9s"></div>
  <div class="particle gold" style="width:3px;height:3px;top:35%;left:45%;animation-delay:3s;animation-duration:10s"></div>
  <div class="particle green" style="width:4px;height:4px;top:80%;left:30%;animation-delay:1.5s;animation-duration:7s"></div>
  <div class="particle bright" style="width:2px;height:2px;top:8%;left:55%;animation-delay:2.5s;animation-duration:8s"></div>
  <div class="particle gold" style="width:3px;height:3px;top:45%;left:85%;animation-delay:4s;animation-duration:9s"></div>
  <div class="particle green" style="width:4px;height:4px;top:90%;left:50%;animation-delay:1s;animation-duration:6s"></div>
  <div class="particle bright" style="width:2px;height:2px;top:70%;left:10%;animation-delay:3.5s;animation-duration:11s"></div>
  <div class="particle gold" style="width:3px;height:3px;top:15%;left:35%;animation-delay:2s;animation-duration:7s"></div>
  <div class="particle green" style="width:2px;height:2px;top:50%;left:92%;animation-delay:0s;animation-duration:8s"></div>
</div>

<!-- Welcome Banner (visible cuando el login esta minimizado) -->
<div class="login-welcome" id="loginWelcome">
  <div class="welcome-title">Bienvenidos</div>
  <div class="welcome-date" id="welcomeDate">&nbsp;</div>
</div>

<!-- Login Card -->
<div class="login-container">
  <div class="login-card minimized" id="loginCard">
    <!-- Minimize button -->
    <button class="login-minimize-btn" id="loginMinBtn" data-tip="Ver paisaje" title="Ver paisaje (Esc)" type="button" aria-label="Minimizar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3l6 6M9 3H3v6M21 3l-6 6M15 3h6v6M3 21l6-6M9 21H3v-6M21 21l-6-6M15 21h6v-6"/>
      </svg>
    </button>

    <img class="login-logo" src="assets/images/logo.png" alt="Frutos Tropicales Peru Export S.A.C.">
    <div class="login-title">Frutos Tropicales Peru Export S.A.C.</div>
    <div class="login-subtitle">Portal de Gestion Integral</div>
    <div class="login-divider"></div>

    <div class="login-field">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="Ingrese su usuario" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Contrasena</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn" type="button" aria-label="Ingresar al portal">Ingresar al Portal</button>
    <div class="login-error" id="loginError" role="alert" aria-live="assertive"></div>

    <a href="#" id="loginForgotLink" class="login-back" style="margin-top:8px;font-size:12px;color:var(--azul,#60a5fa);text-decoration:none" title="Recuperar contrasena">
      <span>¿Olvidaste tu contrasena?</span>
    </a>

    <a href="index.html" class="login-back" title="Regresar al sitio web">
      <span class="login-back-arrow">←</span>
      <span>Volver al sitio web</span>
    </a>
  </div>
</div>

<!-- Modal de recuperacion de password -->
<div id="loginResetModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(6px)">
  <div style="background:#1a1f2e;border-radius:16px;padding:32px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.6);color:#fff">
    <h3 style="margin:0 0 8px;font-size:20px;font-weight:800">Recuperar Contrasena</h3>
    <p style="margin:0 0 20px;font-size:13px;color:#94a3b8">Ingresa tu usuario. Te enviaremos un link por email.</p>
    <input type="text" id="loginResetUser" placeholder="Tu usuario" style="width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff;font-size:14px;margin-bottom:12px" autocomplete="username">
    <div id="loginResetMsg" style="font-size:12px;margin-bottom:12px;min-height:18px"></div>
    <div style="display:flex;gap:8px">
      <button id="loginResetCancel" type="button" style="flex:1;padding:10px;border-radius:8px;border:1px solid #334155;background:transparent;color:#fff;font-weight:600;cursor:pointer">Cancelar</button>
      <button id="loginResetSubmit" type="button" style="flex:1;padding:10px;border-radius:8px;border:none;background:#16a34a;color:#fff;font-weight:700;cursor:pointer">Enviar link</button>
    </div>
  </div>
</div>

<!-- Floating Pill (shown when card is minimized) -->
<div class="login-pill" id="loginPill" role="button" tabindex="0" aria-label="Restaurar formulario de acceso">
  <div class="login-pill-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <div class="login-pill-text">
    <span class="login-pill-label">Portal FTP</span>
    <span class="login-pill-action">Iniciar Sesion</span>
  </div>
  <div class="login-pill-arrow">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M13 5l7 7-7 7"/>
    </svg>
  </div>
</div>

<!-- Keyboard hint (shown when minimized) -->
<div class="login-kbd-hint" id="loginKbdHint">
  Presiona <kbd>Esc</kbd> o haz click en la pildora para volver
</div>

<!-- Clock -->
<div class="login-clock" id="loginClock"></div>

<script type="module">
import { doLogin, getSession, requestPasswordReset, updatePassword } from './assets/js/core/auth.js';
import { checkLockout, recordFailedAttempt, clearAttempts } from './assets/js/utils/rate-limit.js';

// Verificar sesion existente: legacy (ftp_session) o Supabase (sb-*-auth-token)
function _hasAnySession() {
  if (getSession()) return true;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('sb-') && k.endsWith('-auth-token')) {
      const v = localStorage.getItem(k);
      if (v && v.length > 100) return true;
    }
  }
  return false;
}
if (_hasAnySession()) window.location.href = 'portal.html';

const loginBtn = document.getElementById('loginBtn');
const userInput = document.getElementById('loginUser');
const passInput = document.getElementById('loginPass');
const errorEl = document.getElementById('loginError');

async function handleLogin() {
  errorEl.textContent = '';

  // ─── Rate limit check ───
  const username = userInput.value;
  const lock = checkLockout(username);
  if (lock.locked) {
    errorEl.textContent = `Demasiados intentos fallidos. Espera ${Math.ceil(lock.remainingSec / 60)} min.`;
    return;
  }

  loginBtn.textContent = 'Verificando...';
  loginBtn.style.pointerEvents = 'none';

  setTimeout(async () => {
    const result = await doLogin(userInput.value, passInput.value);
    if (result.success) {
      clearAttempts(username); // Reset counter al loguear OK
      loginBtn.textContent = '✓ Bienvenido';
      loginBtn.style.background = '#059669';
      document.querySelector('.login-card').style.cssText = 'opacity:0;transform:scale(0.9) translateY(-30px);transition:all 0.6s ease;filter:blur(5px)';
      document.querySelector('.login-bg').style.cssText = 'transform:scale(1.15);filter:brightness(1.4) saturate(1.5) blur(8px);transition:all 1s ease';
      document.querySelectorAll('.particle').forEach(p => p.style.cssText += ';opacity:0;transition:opacity 0.5s');
      setTimeout(() => { window.location.href = 'portal.html'; }, 600);
    } else {
      // Registrar intento fallido
      const attempt = recordFailedAttempt(username);
      loginBtn.textContent = 'Ingresar al Portal';
      loginBtn.style.pointerEvents = '';
      if (attempt.locked) {
        errorEl.textContent = `Cuenta bloqueada ${Math.ceil(attempt.lockedForSec / 60)} min por ${5} intentos fallidos.`;
      } else if (attempt.attemptsLeft <= 2) {
        errorEl.textContent = `${result.error} (${attempt.attemptsLeft} intento${attempt.attemptsLeft === 1 ? '' : 's'} restante${attempt.attemptsLeft === 1 ? '' : 's'})`;
      } else {
        errorEl.textContent = result.error;
      }
      passInput.value = '';
      passInput.focus();
      const card = document.querySelector('.login-card');
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'shake 0.5s ease';
    }
  }, 400);
}

loginBtn.addEventListener('click', handleLogin);
passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passInput.focus(); });

// ═══════════════════════════════════════════
// PASSWORD RECOVERY FLOW
// ═══════════════════════════════════════════
const resetModal = document.getElementById('loginResetModal');
const resetUser = document.getElementById('loginResetUser');
const resetMsg = document.getElementById('loginResetMsg');
const resetCancel = document.getElementById('loginResetCancel');
const resetSubmit = document.getElementById('loginResetSubmit');
const forgotLink = document.getElementById('loginForgotLink');

forgotLink.addEventListener('click', (e) => {
  e.preventDefault();
  resetMsg.textContent = '';
  resetMsg.style.color = '#94a3b8';
  resetUser.value = userInput.value || '';
  resetModal.style.display = 'flex';
  resetUser.focus();
});
resetCancel.addEventListener('click', () => { resetModal.style.display = 'none'; });
resetModal.addEventListener('click', (e) => { if (e.target === resetModal) resetModal.style.display = 'none'; });

resetSubmit.addEventListener('click', async () => {
  resetSubmit.disabled = true;
  resetSubmit.textContent = 'Enviando...';
  const r = await requestPasswordReset(resetUser.value);
  resetSubmit.disabled = false;
  resetSubmit.textContent = 'Enviar link';
  if (r.success) {
    resetMsg.style.color = '#22c55e';
    resetMsg.textContent = r.message;
    setTimeout(() => { resetModal.style.display = 'none'; }, 3000);
  } else {
    resetMsg.style.color = '#ef4444';
    resetMsg.textContent = r.error;
  }
});

// Si venimos del link de email (?reset=1), mostrar prompt para nueva password
(async () => {
  const params = new URLSearchParams(window.location.search);
  const urlHash = window.location.hash || '';
  if (params.get('reset') === '1' || urlHash.includes('type=recovery')) {
    const newPwd = window.prompt('Ingresa tu nueva contrasena (min 8 caracteres):');
    if (newPwd && newPwd.length >= 8) {
      const r = await updatePassword(newPwd);
      if (r.success) {
        alert('Contrasena actualizada. Ingresa con la nueva.');
        window.location.href = 'login.html';
      } else {
        alert('Error: ' + r.error);
      }
    }
  }
})();

// ═══════════════════════════════════════════
// MINIMIZE / MAXIMIZE con animacion elegante
// ═══════════════════════════════════════════
const card = document.querySelector('.login-card');
const minBtn = document.getElementById('loginMinBtn');
const pill = document.getElementById('loginPill');
const kbdHint = document.getElementById('loginKbdHint');
const welcome = document.getElementById('loginWelcome');
const welcomeDate = document.getElementById('welcomeDate');

// ── Fecha en vivo en el banner ──
function updateWelcome() {
  welcomeDate.textContent = new Date().toLocaleDateString('es-PE',{
    timeZone:'America/Lima', weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
  positionPill();
}

// ── Posicionar la pill a 1cm debajo de la fecha ──
function cmToPx(cm) {
  const probe = document.createElement('div');
  probe.style.cssText = 'position:absolute;width:1cm;height:1cm;visibility:hidden;pointer-events:none';
  document.body.appendChild(probe);
  const px = probe.getBoundingClientRect().width;
  probe.remove();
  return px;
}
const ONE_CM = cmToPx(1);

function positionPill() {
  if (!welcome || !pill) return;
  const rect = welcome.getBoundingClientRect();
  pill.style.top = (rect.bottom + ONE_CM) + 'px';
}

updateWelcome();
setInterval(updateWelcome, 60000);
window.addEventListener('resize', positionPill);
// Recalcular despues de que las animaciones de entrada terminen
setTimeout(positionPill, 100);
setTimeout(positionPill, 900);
setTimeout(positionPill, 1400);

// ── Estado inicial: MINIMIZADO ──
let isMinimized = true;
document.body.classList.add('login-minimized');
// Dar un pequeno delay para que el banner y la pill aparezcan con stagger
setTimeout(() => { welcome.classList.add('visible'); }, 150);
setTimeout(() => { pill.classList.add('visible'); }, 1100);
setTimeout(() => { kbdHint.classList.add('visible'); }, 1600);

function minimizeCard() {
  if (isMinimized) return;
  isMinimized = true;
  card.classList.add('minimized');
  document.body.classList.add('login-minimized');
  setTimeout(() => {
    welcome.classList.remove('hiding');
    welcome.classList.add('visible');
    pill.classList.add('visible');
    kbdHint.classList.add('visible');
  }, 250);
}

function restoreCard() {
  if (!isMinimized) return;
  isMinimized = false;
  welcome.classList.add('hiding');
  welcome.classList.remove('visible');
  pill.classList.remove('visible');
  kbdHint.classList.remove('visible');
  setTimeout(() => {
    card.classList.remove('minimized');
    document.body.classList.remove('login-minimized');
    setTimeout(() => {
      if (!userInput.value) userInput.focus();
      else if (!passInput.value) passInput.focus();
    }, 400);
  }, 150);
}

function toggleCard() {
  isMinimized ? restoreCard() : minimizeCard();
}

minBtn.addEventListener('click', minimizeCard);
pill.addEventListener('click', restoreCard);
pill.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); restoreCard(); }
});

// Keyboard shortcut: ESC toggles
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    e.preventDefault();
    toggleCard();
  }
});

// Live clock
function updateClock() {
  const now = new Date();
  const el = document.getElementById('loginClock');
  if (el) {
    el.textContent = now.toLocaleString('es-PE', { timeZone: 'America/Lima', weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
}
updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
